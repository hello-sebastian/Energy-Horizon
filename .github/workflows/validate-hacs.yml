# Validates repository against HACS default-store requirements (same checks as HACS).
# Default branch for this repo: main (see .github/hacs-submission.json).
# See https://hacs.xyz/docs/publish/action/
name: Validate HACS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log branch and commit (submission context)
        run: |
          echo "ref=${{ github.ref }} sha=${{ github.sha }}"
          echo "See .github/hacs-submission.json for default_branch and merge snapshot reference_commit."

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
